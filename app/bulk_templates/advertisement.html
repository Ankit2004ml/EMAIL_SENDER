<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ product_name }} Special Offer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0c10; color: #c5c6c7; margin: 0; padding: 20px; }
        .card { max-width: 600px; margin: 0 auto; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 12px; }
        h1 { color: #66fcf1; font-size: 28px; margin-top: 0; }
        p { line-height: 1.6; font-size: 16px; }
        .price { font-size: 26px; color: #45f3ff; font-weight: bold; margin: 20px 0; }
        .cta-btn { display: inline-block; background: #66fcf1; color: #0b0c10; padding: 14px 28px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .footer { border-top: 1px solid rgba(255, 255, 255, 0.1); margin-top: 30px; padding-top: 15px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Special Promotion: Get {{ discount }} Off!</h1>
        <p>Introducing the brand new <strong>{{ product_name }}</strong>. Experience cutting edge technology today.</p>
        <p class="price">Now only {{ price }}</p>
        <p>{{ description }}</p>
        <a href="{{ cta_link }}" class="cta-btn">Buy Now</a>
        <div class="footer">
            You are receiving this advertisement because you subscribed to updates from {{ company_name }}.
        </div>
    </div>
</body>
</html>
